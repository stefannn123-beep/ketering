<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anketa — Aplikacija za ketering</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F2;
    --white: #FFFFFF;
    --brand: #2D5BE3;
    --brand-light: #EEF2FD;
    --brand-dark: #1A3FA8;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --text-hint: #9CA3AF;
    --border: #E5E7EB;
    --border-hover: #D1D5DB;
    --success: #10B981;
    --success-light: #ECFDF5;
    --danger: #EF4444;
    --danger-light: #FEF2F2;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: 'Lora', serif;
    font-size: 18px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--brand);
    border-radius: 50%;
  }
  .header-badge {
    font-size: 12px;
    background: var(--brand-light);
    color: var(--brand);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* MAIN */
  main {
    flex: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
    width: 100%;
  }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 2rem; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-meta span {
    font-size: 13px;
    color: var(--text-muted);
  }
  .progress-meta strong {
    font-size: 13px;
    color: var(--brand);
    font-weight: 600;
  }
  .progress-track {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--brand);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--brand);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .q-text {
    font-family: 'Lora', serif;
    font-size: 20px;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .multi-hint {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 1rem;
  }
  .multi-hint svg { flex-shrink: 0; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--white);
    user-select: none;
  }
  .opt:hover { border-color: var(--border-hover); background: #FAFAFA; }
  .opt.selected {
    border-color: var(--brand);
    background: var(--brand-light);
  }
  .opt-indicator {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--white);
  }
  .opt.selected .opt-indicator {
    background: var(--brand);
    border-color: var(--brand);
  }
  .opt-tick {
    width: 9px; height: 9px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .opt.selected .opt-tick { opacity: 1; }
  .opt-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }
  .opt.selected .opt-text { color: var(--brand-dark); font-weight: 500; }

  /* ERROR */
  .err-msg {
    font-size: 12px;
    color: var(--danger);
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--danger-light);
    border-radius: 6px;
    display: none;
  }
  .err-msg.show { display: block; }

  /* NAV */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-secondary {
    background: var(--white);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
  }
  .btn-secondary:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-primary {
    background: var(--brand);
    color: #fff;
  }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* DONE SCREEN */
  .done-screen {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    animation: slideIn 0.3s ease;
  }
  .done-icon-wrap {
    width: 64px; height: 64px;
    background: var(--success-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .done-title {
    font-family: 'Lora', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: .5rem;
  }
  .done-sub {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 2rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .summary-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-hint);
    font-weight: 600;
    text-align: left;
    margin-bottom: 10px;
  }
  .summary-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
  .sum-row {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    text-align: left;
  }
  .sum-q { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .sum-a { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; }
  .btn-restart {
    background: var(--text);
    color: #fff;
    padding: 12px 28px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-restart:hover { opacity: 0.85; }

  @media (max-width: 500px) {
    main { padding: 1.5rem 1rem; }
    .q-card { padding: 1.5rem; }
    .q-text { font-size: 17px; }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Istraživanje korisnika
  </div>
  <div class="header-badge">Projekat SI3PSI</div>
</header>

<main id="app"></main>

<script>
const QUESTIONS = [
  {
    id: 1,
    text: "Kako bi najradije koristio/la aplikaciju za naručivanje keteringa?",
    multi: false,
    opts: [
      "Mobilni telefon (Android ili iOS)",
      "Web pretraživač na računaru ili laptopu",
      "Tablet uređaj",
      "Podjednako mi odgovara na svim uređajima"
    ]
  },
  {
    id: 2,
    text: "Koji vizuelni stil aplikacije ti se najviše sviđa?",
    multi: false,
    opts: [
      "Minimalistički i čist — svetle boje, puno belog prostora",
      "Topao i elegantan — tamne boje, zlatni i braon detalji",
      "Živopisan i veseo — jarke boje, ilustracije, ikonice",
      "Profesionalni i neutralni — sivi tonovi, poslovni izgled"
    ]
  },
  {
    id: 3,
    text: "Šta ti je najvažnije kada biraš ketering paket? (možeš izabrati više)",
    multi: true,
    opts: [
      "Cena po osobi i ukupni trošak",
      "Kvalitetne fotografije jela i prezentacije",
      "Opis sastojaka, alergena i nutritivnih vrednosti",
      "Ocene i recenzije prethodnih korisnika",
      "Dostupnost na željeni datum i vreme",
      "Brzina dostave i pouzdanost"
    ]
  },
  {
    id: 4,
    text: "Kako bi voleo/la da se ketering paketi prikazuju na ekranu?",
    multi: false,
    opts: [
      "Kartice u mrežnom rasporedu (grid sa slikama)",
      "Lista sa detaljnim opisima i cenama",
      "Klizač sa velikim fotografijama (carousel)",
      "Tabela sa poređenjem paketa i opcija"
    ]
  },
  {
    id: 5,
    text: "Koji način filtriranja i pretrage ponude ti je najkorisniji?",
    multi: false,
    opts: [
      "Po tipu događaja — rođendan, svadba, poslovni skup…",
      "Po cenovnom rangu — od najjeftinije do najskuplje",
      "Po broju osoba na događaju",
      "Po oceni, popularnosti i broju narudžbina"
    ]
  },
  {
    id: 6,
    text: "Kako bi voleo/la da izgleda sam proces naručivanja?",
    multi: false,
    opts: [
      "Sve na jednoj dugačkoj stranici (scroll kroz korake)",
      "Čarobnjak korak-po-korak sa jasno vidljivim napretkom",
      "Brza narudžbina — minimum klikova, bez registracije",
      "Interaktivni razgovor sa virtuelnim asistentom (chatbot)"
    ]
  },
  {
    id: 7,
    text: "Koji način plaćanja ti je važan da bude podržan? (možeš izabrati više)",
    multi: true,
    opts: [
      "Gotovina pri isporuci ili preuzimanju",
      "Online plaćanje karticom (Visa, Mastercard)",
      "PayPal ili digitalni novčanici",
      "Lojalni program — popusti za stalne korisnike",
      "Faktura za pravna lica i firme"
    ]
  },
  {
    id: 8,
    text: "Šta bi te najviše motivisalo da kreiraš korisnički nalog u aplikaciji?",
    multi: false,
    opts: [
      "Praćenje istorije i ponovljeno naručivanje omiljenog",
      "Personalizovane preporuke na osnovu prethodnih izbora",
      "Ekskluzivni popusti i akcije za registrovane korisnike",
      "Brže naručivanje bez ponovnog unosa podataka",
      "Ne bi me ništa motivisalo — gostujuća narudžbina mi je dovoljna"
    ]
  },
  {
    id: 9,
    text: "Koje dodatne funkcionalnosti bi voleo/la da postoje u aplikaciji? (možeš izabrati više)",
    multi: true,
    opts: [
      "Kalkulator ukupne cene koji se ažurira u realnom vremenu",
      "Mapa sa praćenjem dostave uživo",
      "Ocenjivanje i pisanje recenzije posle svake narudžbine",
      "Zakazivanje ketering usluge daleko unapred (do 30 dana)",
      "Push notifikacije o statusu narudžbine",
      "Podrška u četu uživo sa operaterom"
    ]
  },
  {
    id: 10,
    text: "Koliko ti je bitno da aplikacija radi brzo i bez kašnjenja?",
    multi: false,
    opts: [
      "Izuzetno bitno — ne prihvatam čekanje duže od 1 sekunde",
      "Bitno — prihvatam učitavanje do 3 sekunde",
      "Umereno — do 5 sekundi je ok ako je sadržaj kvalitetan",
      "Nije mi prioritet, bitno mi je da aplikacija bude funkcionalna"
    ]
  }
];

let current = 0;
const answers = {};

function pct() {
  return Math.round((current / QUESTIONS.length) * 100);
}

function truncate(str, n) {
  return str.length > n ? str.substring(0, n) + '…' : str;
}

function render() {
  const app = document.getElementById('app');
  if (current >= QUESTIONS.length) {
    renderDone(app);
    return;
  }
  const q = QUESTIONS[current];
  const sel = answers[q.id] || [];

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Napredak</span>
        <strong>${pct()}% završeno</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: ${pct()}%"></div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-eyebrow">Pitanje ${current + 1} od ${QUESTIONS.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.multi ? `
        <div class="multi-hint">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="#6B7280" stroke-width="1.5"/>
            <path d="M8 7v4M8 5v.5" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Možeš izabrati više odgovora
        </div>
      ` : ''}
      <div class="options">
        ${q.opts.map((o, i) => `
          <div class="opt${sel.includes(i) ? ' selected' : ''}" onclick="pick(${q.id}, ${i}, ${q.multi})">
            <div class="opt-indicator">
              <svg class="opt-tick" viewBox="0 0 10 10">
                <polyline points="1.5,5 4,7.5 8.5,2.5"/>
              </svg>
            </div>
            <span class="opt-text">${o}</span>
          </div>
        `).join('')}
      </div>
      <div class="err-msg" id="errMsg">Molimo izaberi bar jedan odgovor pre nego što nastaviš.</div>
    </div>

    <div class="nav-row">
      <div>
        ${current > 0 ? `
          <button class="btn btn-secondary" onclick="goBack()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Nazad
          </button>
        ` : '<span></span>'}
      </div>
      <button class="btn btn-primary" onclick="goNext()">
        ${current === QUESTIONS.length - 1 ? 'Završi anketu' : 'Sledeće pitanje'}
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  `;
}

function pick(qid, idx, multi) {
  if (!answers[qid]) answers[qid] = [];
  if (multi) {
    const pos = answers[qid].indexOf(idx);
    if (pos > -1) answers[qid].splice(pos, 1);
    else answers[qid].push(idx);
  } else {
    answers[qid] = [idx];
  }
  document.getElementById('errMsg').classList.remove('show');
  const q = QUESTIONS.find(x => x.id === qid);
  document.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.toggle('selected', answers[qid].includes(i));
  });
}

function goNext() {
  const q = QUESTIONS[current];
  if (!answers[q.id] || answers[q.id].length === 0) {
    document.getElementById('errMsg').classList.add('show');
    return;
  }
  current++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (current > 0) { current--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

function renderDone(app) {
  const summaryRows = QUESTIONS.map(q => {
    const sel = answers[q.id] || [];
    const chosen = sel.map(i => q.opts[i]).join(', ');
    return `
      <div class="sum-row">
        <div class="sum-q">${q.id}. ${truncate(q.text, 60)}</div>
        <div class="sum-a">${chosen || '—'}</div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="done-screen">
      <div class="done-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M5 14l6 6L23 8" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-title">Hvala na odgovorima!</div>
      <div class="done-sub">
        Tvoji odgovori pomažu nam da dizajniramo aplikaciju koja odgovara stvarnim potrebama korisnika.<br>
        Rezultati ankete biće korišćeni u specifikaciji projekta.
      </div>

      <div class="summary-title">Tvoji odgovori</div>
      <div class="summary-list">${summaryRows}</div>

      <button class="btn-restart" onclick="restart()">
        Popuni anketu ponovo
      </button>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  current = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  render();
}

render();
</script>
</body>
</html>
